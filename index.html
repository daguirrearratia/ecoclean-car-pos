<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoclean Car - POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="p-6 max-w-5xl mx-auto">
      <header class="flex justify-between items-center border-b pb-4 mb-6">
        <h1 class="text-2xl font-bold text-orange-600 tracking-wider">ECOCLEAN CAR — POS</h1>
        <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded">Vista Previa Activa</span>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-4 rounded-lg border shadow-sm">
          <h2 class="font-bold text-gray-700 mb-3 border-b pb-1">Datos del Cliente</h2>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Nombre</label>
              <input type="text" class="w-full border p-2 rounded text-sm" value="Juan">
            </div>
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Apellido</label>
              <input type="text" class="w-full border p-2 rounded text-sm" value="Soto">
            </div>
          </div>
          <div class="mt-3">
            <label class="text-xs text-gray-500 font-bold block mb-1">Teléfono Móvil</label>
            <input type="tel" class="w-full border p-2 rounded text-sm" value="+56912345678">
          </div>
          <div class="mt-3">
            <label class="text-xs text-gray-500 font-bold block mb-1">Correo Electrónico</label>
            <input type="email" class="w-full border p-2 rounded text-sm" value="juan.soto@email.com">
          </div>
        </div>

        <div class="bg-white p-4 rounded-lg border shadow-sm">
          <h2 class="font-bold text-gray-700 mb-3 border-b pb-1">Datos del Vehículo</h2>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Patente (Chile)</label>
              <input type="text" class="w-full border p-2 rounded text-sm font-mono tracking-widest" value="BBCC11">
            </div>
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Categoría</label>
              <div class="flex gap-2 mt-1">
                <button class="flex-1 py-1.5 px-2 rounded text-xs font-bold border bg-slate-800 text-white">SEDÁN</button>
                <button class="flex-1 py-1.5 px-2 rounded text-xs font-bold border bg-white text-gray-600">SUV</button>
                <button class="flex-1 py-1.5 px-2 rounded text-xs font-bold border bg-white text-gray-600">XL</button>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-3">
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Marca</label>
              <input type="text" class="w-full border p-2 rounded text-sm" value="Toyota">
            </div>
            <div>
              <label class="text-xs text-gray-500 font-bold block mb-1">Modelo</label>
              <input type="text" class="w-full border p-2 rounded text-sm" value="Yaris">
            </div>
          </div>
        </div>

        <div class="md:col-span-2 bg-slate-800 p-5 rounded-lg text-white">
          <h2 class="font-bold mb-3 text-sm tracking-wide text-orange-400">Selección Estricta de Catálogo (SEDÁN)</h2>
          <select class="w-full p-3 rounded-lg text-sm bg-white font-semibold text-gray-700">
            <option value="">Lavado Full Interior + Exterior Premium — $19.990</option>
            <option value="">Lavado Exterior — $9.990</option>
            <option value="">Limpieza de Tapiz (incluye Higienización) — $27.990</option>
            <option value="">Limpieza y Protección de Motor — $15.990</option>
            <option value="">Higienización Aire Acondicionado — $14.990</option>
          </select>

          <div class="grid grid-cols-3 gap-4 mt-4 bg-slate-700 p-4 rounded-lg text-center font-mono">
            <div>
              <span class="text-xs text-gray-300 block">VALOR NETO</span>
              <span class="text-lg font-bold">$16.798</span>
            </div>
            <div>
              <span class="text-xs text-gray-300 block">IVA (19%)</span>
              <span class="text-lg font-bold">$3.192</span>
            </div>
            <div class="bg-orange-600 rounded p-1">
              <span class="text-xs text-white block font-bold">TOTAL BRUTO</span>
              <span class="text-xl font-black">$19.990</span>
            </div>
          </div>
        </div>

        <div class="md:col-span-2 flex justify-end mt-2">
          <button onclick="window.print()" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all text-sm">SIMULAR IMPRESIÓN DE TICKET</button>
        </div>
      </div>
    </div>

</body>
</html>
